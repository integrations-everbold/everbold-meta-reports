name: Build Meta Report

on:
  workflow_dispatch:

jobs:
  build-meta-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch campaign data
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python fetch_all_clients.py

      - name: Fetch time series data
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python fetch_timeseries.py

      - name: Fetch creative data
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python fetch_creatives.py

      - name: Generate premium report
        run: python generate_report.py

      - name: Upload generated report
        uses: actions/upload-artifact@v4
        with:
          name: meta-report
          path: docs/
